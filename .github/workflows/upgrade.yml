name: upgrade dependencies
on:
  # manually run this action using the GitHub UI
  # https://github.blog/changelog/2020-07-06-github-actions-manual-triggers-with-workflow_dispatch/
  workflow_dispatch:
    inputs:
      filter:
        description: Optional argument for "npm run upgrade"
        required: false
        default: ""
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: 🤝 Set Node version from .nvmrc
        run: echo NVMRC=`cat .nvmrc` >> $GITHUB_ENV

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NVMRC }}

      - name: 📥 Download deps
        run: npm run reinstall

      - name: Configure git user
        run: |
          git config --global user.email ${{ github.actor }}@users.noreply.github.com
          git config --global user.name ${{ github.actor }}

      - name: 🍏 Upgrade dependencies
        env:
          FILTER: ${{ github.event.inputs.filter }}
        shell: bash {0}
        run: |
          if [[ -n "$FILTER" && ! "$FILTER" =~ ^@paypal/ ]]; then
            echo "Error: Only @paypal packages are allowed."
            exit 1
          fi
          npm run upgrade -- --MODULE="${FILTER}"
